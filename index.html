<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mabar Kuy</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.loader {
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0;} to {opacity: 1;}
}

.spinner {
    border: 5px solid rgba(255,255,255,0.2);
    border-top: 5px solid #38bdf8;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    animation: spin 1s linear infinite;
    margin: 20px auto;
}

@keyframes spin {
    0% { transform: rotate(0deg);} 
    100% { transform: rotate(360deg);} 
}

.card {
    display: none;
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 20px;
    max-width: 320px;
}

button {
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 12px;
    margin-top: 10px;
    font-size: 14px;
    cursor: pointer;
}

.install {
    background: linear-gradient(45deg, #22c55e, #4ade80);
    color: black;
    font-weight: bold;
}

.fun {
    font-size: 13px;
    margin-top: 10px;
    opacity: 0.8;
}
</style>
</head>
<body>

<div class="loader" id="loader">
    <h2>🎮 Anjayy Login ...</h2>
    <div class="spinner"></div>
    <p>Masuk ke game... sabar dikit 😎</p>
</div>

<div class="card" id="fallback">
    <h2>😅 Waduh...</h2>
    <p>Game kamu kayaknya belum ada ye 😭</p>
    <button class="install" onclick="installGame()">Install Game 🔥</button>
    <div class="fun">Biar bisa mabar bareng 😆</div>
</div>

<script>
function openGame() {
    // coba buka game (contoh Mobile Legends scheme)
    window.location.href = "intent://#Intent;scheme=mobilelegends;package=com.mobile.legends;end";
}

function installGame() {
    window.location.href = "https://play.google.com/store/apps/details?id=com.mobile.legends";
}

// mulai loading
setTimeout(() => {
    openGame();

    // fallback kalau gak kebuka
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
        document.getElementById("fallback").style.display = "block";
    }, 2000);

}, 2000);
</script>

</body>
</html>
